<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>George FM</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: #0f0f1e;
      color: white;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .content {
      padding: 40px 20px;
    }
    .logo {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 8px solid #00ffcc;
      background: url('https://i.imgur.com/2v3kL9p.png') center/cover;
      margin: 0 auto 30px;
    }
    h1 { font-size: 32px; margin: 0 0 10px; }
    p { color: #00ffcc; font-size: 18px; }
    button {
      margin-top: 40px;
      padding: 18px 50px;
      font-size: 21px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      background: #00ffcc;
      color: black;
      width: 280px;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="logo"></div>
    <h1>George FM</h1>
    <p>Dance & Electronic • 24/7</p>
    <button onclick="startRadio()">▶️ Слушать George FM</button>
  </div>

  <script>
    function startRadio() {
      const audio = new Audio("https://mediaworks.streamguys1.com/george_net/playlist.m3u8");
      audio.play()
        .then(() => alert("✅ Звук запущен!"))
        .catch(() => alert("Не удалось запустить звук"));
    }
  </script>
</body>
</html>

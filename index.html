
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>George FM</title>
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: #0f0f1e;
      font-family: system-ui, sans-serif;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation; /* важно для мобильных */
    }
    .box {
      text-align: center;
      padding: 40px 20px;
      max-width: 360px;
    }
    .logo {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 8px solid #00ffcc;
      background: url('https://i.imgur.com/2v3kL9p.png') center/cover;
      margin: 0 auto 30px;
    }
    h1 { font-size: 32px; margin: 0 0 10px; }
    button {
      margin-top: 40px;
      padding: 18px 50px;
      font-size: 21px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      background: #00ffcc;
      color: black;
      width: 280px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .status {
      margin-top: 25px;
      font-size: 16px;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo"></div>
    <h1>George FM</h1>
    <p style="color:#00ffcc; margin-bottom: 30px;">Dance & Electronic • 24/7</p>

    <button id="playBtn">▶️ Слушать George FM</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    // Инициализация VK Bridge с небольшой задержкой
    setTimeout(() => {
      VKBridge.send('VKWebAppInit').catch(() => {});
    }, 100);

    const streamUrl = "https://mediaworks.streamguys1.com/george_net/playlist.m3u8";
    const audio = new Audio(streamUrl);
    const btn = document.getElementById('playBtn');
    const status = document.getElementById('status');
    let isPlaying = false;

    btn.addEventListener('click', function() {
      if (isPlaying) {
        audio.pause();
        btn.textContent = "▶️ Слушать George FM";
        status.textContent = "Пауза";
        isPlaying = false;
      } else {
        status.textContent = "Загрузка...";
        audio.play()
          .then(() => {
            btn.textContent = "⏸ Пауза";
            status.textContent = "✅ Играет • Можно сворачивать";
            isPlaying = true;
          })
          .catch(() => {
            status.textContent = "Не удалось запустить. Нажми ещё раз.";
          });
      }
    });

    // Дополнительно для мобильных тачей
    btn.addEventListener('touchstart', function(e) {
      e.preventDefault(); // предотвращаем возможные конфликты
    }, { passive: false });
  </script>
</body>
</html>
